<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Banca</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-symbol {
            position: absolute;
            left: 12px;
            color: #888;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: #4a90e2;
        }

        .divider {
            height: 1px;
            background-color: #eee;
            margin: 25px 0;
        }

        .result-box {
            background-color: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-title {
            color: #666;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .result-value {
            font-size: 1.15rem;
            font-weight: bold;
            color: #222;
        }

        .status-card {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.3s, color 0.3s;
            font-weight: bold;
            background-color: #eee;
            color: #333;
        }

        .bg-verde {
            background-color: #d4edda !important;
            color: #155724 !important;
            border-left: 5px solid #28a745;
        }

        .bg-vermelho {
            background-color: #f8d7da !important;
            color: #721c24 !important;
            border-left: 5px solid #dc3545;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculadora de Divisão de Banca</h2>
    
    <!-- Inputs mudados para tipo TEXT para suportar a máscara de pontos e vírgulas -->
    <div class="input-group">
        <label for="bancaA">Banca CASA A</label>
        <div class="input-wrapper">
            <span class="currency-symbol">R$</span>
            <input type="text" id="bancaA" placeholder="0,00" inputmode="numeric">
        </div>
    </div>

    <div class="input-group">
        <label for="bancaB">Banca CASA B</label>
        <div class="input-wrapper">
            <span class="currency-symbol">R$</span>
            <input type="text" id="bancaB" placeholder="0,00" inputmode="numeric">
        </div>
    </div>

    <div class="divider"></div>

    <!-- Resultados -->
    <div class="result-box">
        <span class="result-title">Soma Total das Bancas:</span>
        <span class="result-value" id="somaTotal">R$ 0,00</span>
    </div>

    <div class="status-card" id="cardA">
        <span>Porcentagem CASA A:</span>
        <span id="porcentagemA">0%</span>
    </div>

    <div class="status-card" id="cardB">
        <span>Porcentagem CASA B:</span>
        <span id="porcentagemB">0%</span>
    </div>
</div>

<script>
    const inputA = document.getElementById('bancaA');
    const inputB = document.getElementById('bancaB');
    
    const txtSoma = document.getElementById('somaTotal');
    const txtPctA = document.getElementById('porcentagemA');
    const txtPctB = document.getElementById('porcentagemB');
    
    const cardA = document.getElementById('cardA');
    const cardB = document.getElementById('cardB');

    // Função que formata o input em tempo real como Moeda Brasileira (14.476,00)
    function formatarMoeda(input) {
        let valor = input.value.replace(/\D/g, ""); // Remove tudo que não for número
        
        if (valor === "") {
            input.value = "";
            return 0;
        }

        // Converte para decimal (centavos)
        let valorNum = parseFloat(valor) / 100;
        
        // Formata visualmente no padrão PT-BR
        input.value = valorNum.toLocaleString('pt-BR', {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });

        return valorNum;
    }

    // Função auxiliar para pegar o valor numérico puro de um input já formatado
    function obterValorPuro(input) {
        let valor = input.value.replace(/\D/g, "");
        if (valor === "") return 0;
        return parseFloat(valor) / 100;
    }

    function processarCalculos() {
        let valA = obterValorPuro(inputA);
        let valB = obterValorPuro(inputB);

        let total = valA + valB;

        // Atualiza o total formatado
        txtSoma.innerText = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

        if (total > 0) {
            let pctA = (valA / total) * 100;
            let pctB = (valB / total) * 100;

            txtPctA.innerText = pctA.toFixed(2) + '%';
            txtPctB.innerText = pctB.toFixed(2) + '%';

            // Regra Casa A (>70% Verde)
            if (pctA > 70) {
                cardA.className = "status-card bg-verde";
            } else {
                cardA.className = "status-card bg-vermelho";
            }

            // Regra Casa B (>30% Vermelho)
            if (pctB > 30) {
                cardB.className = "status-card bg-vermelho";
            } else {
                cardB.className = "status-card bg-verde";
            }

        } else {
            txtPctA.innerText = '0%';
            txtPctB.innerText = '0%';
            cardA.className = "status-card";
            cardB.className = "status-card";
        }
    }

    // Eventos disparados ao digitar em cada input
    inputA.addEventListener('input', function() {
        formatarMoeda(this);
        processarCalculos();
    });

    inputB.addEventListener('input', function() {
        formatarMoeda(this);
        processarCalculos();
    });
</script>

</body>
</html>
